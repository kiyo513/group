<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グループ分け</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>グループ分け</h1>

    <div class="card">

        <h2>メンバー追加</h2>

        <input id="name" maxlength="50" placeholder="名前">

        <input id="attr" placeholder="属性">

        <div class="buttonRow">
            <button id="addBtn">追加</button>
            <button id="defaultBtn">デフォルト</button>
        </div>

    </div>

    <div class="card">

        <h2>登録メンバー</h2>

        <ul id="memberList"></ul>

    </div>

    <div class="card">

        <h2>グループ数</h2>

        <input id="groupCount" type="number" min="1" value="2">

        <button id="divideBtn">グループ分け</button>

    </div>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
